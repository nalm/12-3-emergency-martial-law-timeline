<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>12.3 비상계엄 사건 인터랙티브 타임라인</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', system-ui, sans-serif;
    background: #f8fafc; color: #0f172a;
  }
  .app { display: flex; flex-direction: column; height: 100vh; }

  /* ===== Header ===== */
  header.top {
    padding: 14px 20px 10px;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: #f1f5f9;
    border-bottom: 1px solid #334155;
  }
  header.top h1 {
    margin: 0 0 6px; font-size: 18px; font-weight: 700; letter-spacing: -0.3px;
  }
  header.top .sub { font-size: 12px; color: #94a3b8; }

  /* ===== Controls ===== */
  .controls {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    padding: 10px 16px; background: #ffffff; border-bottom: 1px solid #e2e8f0;
    position: sticky; top: 0; z-index: 30;
  }
  .controls .group {
    display: flex; align-items: center; gap: 6px;
  }
  .controls label { font-size: 12px; color: #475569; font-weight: 600; }
  .controls input[type=search] {
    padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 6px;
    font-size: 13px; width: 220px; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .controls input[type=search]:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; font-size: 12px; font-weight: 600;
    border: 1.5px solid; border-radius: 14px; cursor: pointer; user-select: none;
    background: #fff; transition: all .12s;
  }
  .chip:hover { transform: translateY(-1px); }
  .chip.active { color: #fff; }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; }
  .phase-jump { display: flex; gap: 6px; }
  .phase-jump button {
    border: 1px solid #cbd5e1; background: #fff;
    font-size: 11px; padding: 4px 8px; border-radius: 4px;
    cursor: pointer; color: #334155; font-weight: 600;
  }
  .phase-jump button:hover { background: #f1f5f9; }
  .reset-btn {
    border: 1px solid #cbd5e1; background: #fff;
    padding: 5px 10px; border-radius: 6px; font-size: 12px;
    cursor: pointer; color: #475569; font-weight: 600;
  }
  .reset-btn:hover { background: #f1f5f9; }
  .stats { font-size: 12px; color: #64748b; margin-left: auto; }
  .stats b { color: #0f172a; font-size: 13px; }

  /* ===== Person filter row ===== */
  .person-row {
    display: flex; flex-wrap: wrap; gap: 5px;
    padding: 8px 16px; background: #f1f5f9; border-bottom: 1px solid #e2e8f0;
  }

  /* ===== Table ===== */
  .table-wrap {
    flex: 1; overflow: auto; position: relative;
    background: #fff;
  }
  table.tl {
    border-collapse: separate; border-spacing: 0;
    font-size: 12px; min-width: 100%;
  }
  table.tl thead th {
    position: sticky; top: 0; z-index: 20;
    background: #0f172a; color: #f1f5f9;
    padding: 8px 6px; min-width: 180px; max-width: 200px;
    border-right: 1px solid #1e293b; border-bottom: 2px solid #334155;
    text-align: center; vertical-align: middle;
    font-weight: 600; white-space: normal;
  }
  table.tl thead th .role {
    display: block; font-size: 10px; color: #94a3b8; font-weight: 500; margin-top: 2px;
  }
  table.tl thead th.time-col {
    left: 0; z-index: 22; min-width: 150px; max-width: 160px;
    background: #020617;
  }
  table.tl tbody td.time-cell {
    position: sticky; left: 0; z-index: 10;
    font-weight: 700; font-size: 11.5px; text-align: center;
    padding: 8px 6px; vertical-align: middle;
    border-right: 2px solid #334155;
    background: #1e293b; color: #f1f5f9;
    min-width: 150px; max-width: 160px;
  }
  table.tl tbody td {
    padding: 8px 8px; vertical-align: top;
    border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0;
    line-height: 1.45; min-width: 180px; max-width: 200px;
    background: #fff;
    transition: background .12s;
  }
  table.tl tbody td.has-action {
    border-left: 3px solid transparent;
  }
  table.tl tbody tr:hover td { background: #fafafa; }
  table.tl tbody tr:hover td.time-cell { background: #334155; }
  table.tl tbody tr.phase-pre td.time-cell { background: #92400e; }
  table.tl tbody tr.phase-imminent td.time-cell { background: #c2410c; }
  table.tl tbody tr.phase-dday td.time-cell { background: #b91c1c; }
  table.tl tbody tr.phase-release td.time-cell { background: #15803d; }
  table.tl tbody tr.phase-after td.time-cell { background: #1d4ed8; }

  table.tl tbody td.has-action.dim { opacity: 0.18; }
  table.tl tbody td.has-action.highlight { background: #fef9c3 !important; }

  mark.q {
    background: #fde047; padding: 0 2px; border-radius: 2px; color: #422006; font-weight: 600;
  }

  .star {
    display: inline-block; background: #dc2626; color: #fff;
    font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-right: 4px;
    font-weight: 700; letter-spacing: 0.5px;
  }

  .row-hidden { display: none; }
  .col-hidden { display: none; }

  .empty-state {
    padding: 60px 20px; text-align: center; color: #94a3b8; font-size: 13px;
  }

  /* Legend */
  .legend {
    display: flex; flex-wrap: wrap; gap: 12px;
    padding: 6px 16px; background: #f8fafc; border-top: 1px solid #e2e8f0;
    font-size: 11px; color: #64748b;
  }
  .legend span.lg { display: inline-flex; align-items: center; gap: 4px; }
  .legend span.lg b { display: inline-block; width: 10px; height: 10px; border-radius: 2px; }

  @media (max-width: 768px) {
    .controls input[type=search] { width: 140px; }
    table.tl thead th, table.tl tbody td { min-width: 140px; max-width: 160px; font-size: 11px; }
    table.tl thead th.time-col, table.tl tbody td.time-cell { min-width: 120px; max-width: 130px; }
  }
</style>
</head>
<body>
<div class="app">

  <header class="top">
    <h1>12.3 비상계엄 사건 — 인터랙티브 타임라인</h1>
    <div class="sub">행: 시간순 / 열: 인물별 · 인물·단계 필터, 키워드 검색, 단계 점프 지원 · 셀 클릭 시 같은 행위자만 강조</div>
  </header>

  <div class="controls">
    <div class="group">
      <label>검색</label>
      <input type="search" id="searchBox" placeholder="키워드 (예: 헬기, 국회, 포고령)">
    </div>
    <div class="group" id="phaseChips"></div>
    <div class="group phase-jump" id="phaseJump"></div>
    <button class="reset-btn" id="resetBtn">초기화</button>
    <div class="stats" id="stats"></div>
  </div>

  <div class="person-row" id="personRow"></div>

  <div class="table-wrap">
    <table class="tl" id="tl">
      <thead><tr id="theadRow"></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none;">표시할 행이 없습니다. 필터를 조정해 보세요.</div>
  </div>

  <div class="legend">
    <span class="lg"><b style="background:#dc2626;"></b> 핵심 사건은 ★ 표시</span>
    <span class="lg">단계별 색상: <b style="background:#92400e;"></b>사전 <b style="background:#c2410c;"></b>임박 <b style="background:#b91c1c;"></b>선포일 <b style="background:#15803d;"></b>해제일 <b style="background:#1d4ed8;"></b>사후</span>
    <span class="lg">셀 클릭 → 해당 인물만 강조 · 같은 인물 헤더 클릭 → 토글 필터</span>
  </div>
</div>

const PHASES = [{"key": "pre", "label": "사전 모의\n(3~11월)", "color": "#fef3c7", "border": "#f59e0b"}, {"key": "imminent", "label": "임박 단계\n(12.1~12.2)", "color": "#fed7aa", "border": "#ea580c"}, {"key": "dday", "label": "계엄 선포일\n(12.3)", "color": "#fecaca", "border": "#dc2626"}, {"key": "release", "label": "계엄 해제일\n(12.4)", "color": "#bbf7d0", "border": "#16a34a"}, {"key": "after", "label": "사후 (문서위조·탄핵)\n(12.5~12.14)", "color": "#bfdbfe", "border": "#2563eb"}];

const state = {
  query: "",
  activePhases: new Set(PHASES.map(p => p.key)),
  activePersons: new Set(DATA.persons.map(p => p.key)),
  focusPerson: null,
};

const $ = sel => document.querySelector(sel);

function renderPhaseChips() {
  const wrap = $("#phaseChips");
  wrap.innerHTML = "";
  PHASES.forEach(ph => {
    const chip = document.createElement("span");
    chip.className = "chip" + (state.activePhases.has(ph.key) ? " active" : "");
    chip.style.borderColor = ph.border;
    if (state.activePhases.has(ph.key)) {
      chip.style.background = ph.border;
      chip.style.color = "#fff";
    } else {
      chip.style.color = ph.border;
    }
    chip.innerHTML = `<span class="dot" style="background:${ph.border}"></span>${ph.label.replace(/\n/g," ")}`;
    chip.onclick = () => {
      if (state.activePhases.has(ph.key)) state.activePhases.delete(ph.key);
      else state.activePhases.add(ph.key);
      renderPhaseChips(); applyFilters();
    };
    wrap.appendChild(chip);
  });
}

function renderPhaseJump() {
  const wrap = $("#phaseJump");
  wrap.innerHTML = "";
  PHASES.forEach(ph => {
    const btn = document.createElement("button");
    btn.textContent = "▶ " + ph.label.split("\n")[0];
    btn.title = "이 단계의 첫 행으로 이동";
    btn.onclick = () => {
      const target = document.querySelector(`tr[data-phase='${ph.key}']:not(.row-hidden)`);
      if (target) {
        target.scrollIntoView({behavior:"smooth", block:"start"});
        target.style.transition = "background 1.5s";
        target.querySelectorAll("td").forEach(td => {
          td.style.background = "#fef08a";
          setTimeout(() => { td.style.background = ""; }, 1200);
        });
      }
    };
    wrap.appendChild(btn);
  });
}

    if (active) {
      chip.style.background = p.color;
      chip.style.color = "#fff";
    } else {
      chip.style.color = p.color;
    }
    chip.innerHTML = `<span class="dot" style="background:${p.color}"></span>${p.label}`;
    chip.onclick = () => {
      if (state.activePersons.has(p.key)) state.activePersons.delete(p.key);
      else state.activePersons.add(p.key);
      renderPersonChips(); renderTable();
    };
    wrap.appendChild(chip);
  });
  // 전체/해제
  const all = document.createElement("span");
  all.className = "chip";
  all.style.cssText = "border-color:#0f172a;color:#0f172a;margin-left:auto;";
  all.textContent = "전체 선택";
  all.onclick = () => { DATA.persons.forEach(p => state.activePersons.add(p.key)); renderPersonChips(); renderTable(); };
  wrap.appendChild(all);
  const none = document.createElement("span");
  none.className = "chip";
  none.style.cssText = "border-color:#64748b;color:#64748b;";
  none.textContent = "모두 해제";
  none.onclick = () => { state.activePersons.clear(); renderPersonChips(); renderTable(); };
  wrap.appendChild(none);
}

function renderTable() {
  // header
  const thead = $("#theadRow");
  thead.innerHTML = "";
  const thTime = document.createElement("th");
  thTime.className = "time-col";
  thTime.textContent = "시간";
  thead.appendChild(thTime);
  DATA.persons.forEach(p => {
    const th = document.createElement("th");
    th.style.borderTop = `4px solid ${p.color}`;
    th.style.cursor = "pointer";
    th.title = "클릭: 이 인물만 강조 · 다시 클릭하면 해제";
    th.innerHTML = `${p.label}<span class="role">${p.role}</span>`;
    th.dataset.person = p.key;
    if (!state.activePersons.has(p.key)) th.classList.add("col-hidden");
    if (state.focusPerson === p.key) th.style.background = "#fbbf24", th.style.color = "#422006";
    th.onclick = () => {
      state.focusPerson = state.focusPerson === p.key ? null : p.key;
      renderTable();
    };
    thead.appendChild(th);
  });

  // body
  const tbody = $("#tbody");
  tbody.innerHTML = "";
  const q = state.query.trim().toLowerCase();
  let visibleCount = 0;

  DATA.rows.forEach(row => {
    const tr = document.createElement("tr");
    tr.dataset.phase = row.phase;
    tr.className = "phase-" + row.phase;

    const showByPhase = state.activePhases.has(row.phase);
    // 검색 매치: time 또는 활성 인물 중 어느 셀에라도 매치
    let rowMatchesQ = !q;
    if (q) {
      if (row.time.toLowerCase().includes(q)) rowMatchesQ = true;
      else {
        for (const k of Object.keys(row.actions)) {
          if (!state.activePersons.has(k)) continue;
          if (String(row.actions[k]).toLowerCase().includes(q)) { rowMatchesQ = true; break; }
        }
      }
    }
    // 활성 인물에서 어떤 행위라도 있는 행만 표시
    let hasAnyActiveAction = false;
    for (const k of Object.keys(row.actions)) {
      if (state.activePersons.has(k)) { hasAnyActiveAction = true; break; }
    }

    if (!showByPhase || !rowMatchesQ || !hasAnyActiveAction) tr.classList.add("row-hidden");
    else visibleCount++;

    const tdTime = document.createElement("td");
    tdTime.className = "time-cell";
    tdTime.textContent = row.time;
    tr.appendChild(tdTime);

    DATA.persons.forEach(p => {
      const td = document.createElement("td");
      td.dataset.person = p.key;
      if (!state.activePersons.has(p.key)) td.classList.add("col-hidden");
      const txt = row.actions[p.key];
      if (txt) {
        td.classList.add("has-action");
        td.style.borderLeftColor = p.color;
        let content = String(txt);
        // ★ 강조
        content = content.replace(/★/g, '<span class="star">★</span>');
        // 검색어 하이라이트
        if (q) {
          const re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig");
          content = content.replace(re, '<mark class="q">$1</mark>');
        }
        td.innerHTML = content;
        // focus 인물 강조
        if (state.focusPerson) {
          if (p.key === state.focusPerson) td.classList.add("highlight");
          else td.classList.add("dim");
        }
        td.style.cursor = "pointer";
        td.onclick = (e) => {
          e.stopPropagation();
          state.focusPerson = state.focusPerson === p.key ? null : p.key;
          renderTable();
        };
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  // stats
  $("#stats").innerHTML = `표시 행: <b>${visibleCount}</b> / ${DATA.rows.length} · 인물: <b>${state.activePersons.size}</b>/${DATA.persons.length}${state.focusPerson ? ` · 강조: <b>${state.focusPerson}</b>` : ""}`;
  $("#emptyState").style.display = visibleCount === 0 ? "block" : "none";
}

function applyFilters() {
  renderTable();
}

$("#searchBox").addEventListener("input", e => {
  state.query = e.target.value;
  renderTable();
});

$("#resetBtn").onclick = () => {
  state.query = "";
  state.activePhases = new Set(PHASES.map(p => p.key));
  state.activePersons = new Set(DATA.persons.map(p => p.key));
  state.focusPerson = null;
  $("#searchBox").value = "";
  renderPhaseChips(); renderPersonChips(); renderTable();
};

renderPhaseChips();
renderPhaseJump();
renderPersonChips();
renderTable();
</script>
</body>
</html>
